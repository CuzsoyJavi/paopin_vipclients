<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>跑品客户门户 · 外部商家客户版</title>
  <style>
    :root {
      --paper: #fbfaf6;
      --ink: #172033;
      --muted: #6d7480;
      --line: rgba(23, 32, 51, .11);
      --blue: #1e5aa7;
      --green: #087f5b;
      --red: #bf3d3d;
      --gold: #b7862f;
      --card: rgba(255,255,255,.88);
      --shadow: 0 16px 44px rgba(30, 45, 70, .09);
      --serif: "Songti SC", "STSong", "Noto Serif CJK SC", Georgia, serif;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 16% 0%, rgba(30, 90, 167, .10), transparent 26rem), linear-gradient(120deg, #fffefa 0%, var(--paper) 52%, #f8fbff 100%);
      font-family: var(--sans);
      width: 100%;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .36;
      background-image: linear-gradient(rgba(23,32,51,.025) 1px, transparent 1px), linear-gradient(90deg, rgba(23,32,51,.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 78%);
    }
    .app { display: grid; grid-template-columns: 248px minmax(0, 1fr); min-height: 100vh; width: 100%; }
    .sidebar {
      position: sticky; top: 0; height: 100vh;
      padding: 28px 22px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.66);
      backdrop-filter: blur(18px);
      z-index: 20;
    }
    .brand-mark { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .mark { width: 42px; height: 42px; border-radius: 16px; display: grid; place-items: center; background: var(--ink); color: white; font-family: var(--serif); font-size: 20px; box-shadow: 0 12px 30px rgba(23,32,51,.18); }
    .brand-title { font-weight: 760; letter-spacing: -.02em; }
    .brand-sub { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .nav { display: grid; gap: 8px; }
    .nav a { color: var(--muted); text-decoration: none; padding: 11px 12px; border-radius: 14px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .nav a:hover, .nav a.active { background: #fff; color: var(--ink); box-shadow: 0 10px 24px rgba(23,32,51,.06); }
    .side-note { position: absolute; left: 22px; right: 22px; bottom: 24px; padding: 15px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.75); font-size: 12px; color: var(--muted); line-height: 1.65; }
    main { padding: 28px 44px 72px; position: relative; z-index: 1; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap: 18px; padding: 16px 18px; border:1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,.76); box-shadow: var(--shadow); backdrop-filter: blur(14px); }
    .topbar-left { display:flex; align-items:center; gap: 10px; flex-wrap:wrap; }
    .eyebrow { color: var(--blue); font-weight: 760; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    .pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.76); color: var(--muted); font-size: 12px; }
    .date-select { appearance:none; border:1px solid var(--line); border-radius:999px; padding: 10px 34px 10px 14px; color:var(--ink); background:white; font:inherit; font-size:13px; cursor:pointer; }
    .section { margin-top: 30px; }
    .section-head { display:flex; justify-content:space-between; align-items:end; gap:24px; margin: 0 2px 16px; }
    .section h2 { margin: 0; font-family: var(--serif); font-size: 28px; letter-spacing: -.04em; font-weight: 620; }
    .section-desc { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 720px; }
    .grid-2 { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .grid-3 { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
    .card { border: 1px solid var(--line); background: var(--card); border-radius: 26px; box-shadow: 0 14px 34px rgba(30,45,70,.07); backdrop-filter: blur(12px); min-width: 0; }
    .metric-card { padding: 22px; min-height: 182px; }
    .metric-top { display:flex; justify-content:space-between; align-items:start; gap:16px; }
    .metric-title { font-size: 14px; color: var(--muted); font-weight: 650; }
    .metric-value { margin-top: 12px; font-size: 34px; font-weight: 780; letter-spacing: -.045em; }
    .metric-kpis { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top: 18px; }
    .mini-kpi { padding: 12px; background: rgba(244,241,233,.62); border-radius: 18px; }
    .mini-kpi span { display:block; color: var(--muted); font-size: 11px; }
    .mini-kpi b { display:block; margin-top:4px; font-size: 16px; }
    .link-badge { color: white; background: var(--blue); padding: 7px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .link-badge.shop { background: #1b7c83; }
    .panel { padding: 22px; }
    .table-wrap, .md-table-wrap { display:block; overflow-x: auto; overflow-y: hidden; border-radius: 20px; border: 1px solid var(--line); background: rgba(255,255,255,.55); width:100%; max-width:100%; min-width:0; -webkit-overflow-scrolling: touch; }
    table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
    th, td { padding: 12px 14px; border-bottom: 1px solid rgba(23,32,51,.08); text-align: left; white-space: nowrap; vertical-align: top; background: rgba(255,255,255,.78); }
    th { color: var(--muted); font-weight: 720; background: rgba(244,241,233,.96); position: sticky; top: 0; z-index: 1; }
    th.sticky-customer, td.sticky-customer { position: sticky; left: 0; z-index: 3; min-width: 180px; max-width: 260px; box-shadow: 10px 0 14px rgba(23,32,51,.06); }
    th.sticky-customer { z-index: 4; background: #f4f1e9; }
    td.sticky-customer { background: #fff; font-weight: 680; }
    tr:last-child td { border-bottom: none; }
    .md-table-wrap table, .table-wrap table { width:max-content; min-width:100%; }
    .md-table-wrap th, .md-table-wrap td { white-space:nowrap; }
    .md-table-wrap td:first-child { white-space:normal; min-width:220px; max-width:420px; line-height:1.45; }

    .up { color: var(--green); font-weight: 760; }
    .down { color: var(--red); font-weight: 760; }
    .flat { color: var(--muted); }
    .segment { display:inline-flex; padding:5px; border-radius:999px; background: rgba(23,32,51,.06); gap:4px; flex-wrap:wrap; }
    .segment button, .ghost-btn { border: 0; background: transparent; color: var(--muted); padding: 8px 12px; border-radius: 999px; cursor: pointer; font: inherit; font-size: 13px; }
    .segment button.active, .ghost-btn:hover { background: white; color: var(--ink); box-shadow: 0 8px 18px rgba(23,32,51,.06); }
    .treemap-row { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .treemap-card { padding: 20px; min-height: 390px; }
    .treemap-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .treemap-title strong { font-size: 17px; }
    .treemap { position: relative; height: 304px; border-radius: 24px; overflow: hidden; background: #fff; border: 1px solid var(--line); }
    .tile { position:absolute; padding:14px; overflow:hidden; border: 2px solid #fff; color:#fff; display:flex; flex-direction:column; justify-content:space-between; }
    .tile b { font-size: clamp(13px, 1.5vw, 22px); line-height: 1.15; text-shadow: 0 1px 10px rgba(0,0,0,.24); }
    .tile span { font-family: var(--mono); font-size: 13px; opacity:.94; }
    .category-tabs { display:flex; gap:8px; flex-wrap:wrap; margin: 14px 0 18px; }
    .category-tabs button { border:1px solid var(--line); background: rgba(255,255,255,.78); padding: 9px 12px; border-radius:999px; cursor:pointer; color:var(--muted); font:inherit; font-size:13px; }
    .category-tabs button.active { background: var(--ink); color:#fff; border-color:var(--ink); }
    .product-grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .product-card { overflow:hidden; cursor:pointer; transition: transform .2s ease, box-shadow .2s ease; }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 22px 52px rgba(23,32,51,.12); }
    .cover { height: 180px; position: relative; background: linear-gradient(135deg, #e8edf5, #faf5e8); overflow: hidden; }
    .cover video { width:100%; height:100%; object-fit:cover; display:block; filter:saturate(.96) contrast(1.02); }
    .cover-fallback { position:absolute; inset:0; display:grid; place-items:center; padding:20px; text-align:center; font-family:var(--serif); color:rgba(23,32,51,.78); background: linear-gradient(135deg,#f1efe8,#e9f1fb); }
    .rank { position:absolute; top:12px; left:12px; background:rgba(255,255,255,.9); color:var(--ink); border-radius:999px; padding:6px 10px; font-weight:800; font-family:var(--mono); font-size:12px; }
    .play-dot { position:absolute; right:12px; bottom:12px; width:38px; height:38px; border-radius:50%; background:rgba(23,32,51,.86); color:white; display:grid; place-items:center; }
    .product-body { padding: 15px; }
    .product-name { font-weight:760; line-height:1.35; min-height: 38px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .product-meta { display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-top: 13px; }
    .product-meta div { background: rgba(244,241,233,.68); border-radius:14px; padding:8px; }
    .product-meta span { display:block; color:var(--muted); font-size:10px; }
    .product-meta b { display:block; margin-top:3px; font-size:13px; }
    .client-grid { display:grid; grid-template-columns: 1fr; gap:14px; width:100%; }
    .client-card { padding:22px; min-width:0; max-width:100%; overflow:hidden; }
    .client-head { display:flex; justify-content:space-between; align-items:start; gap:18px; margin-bottom:18px; }
    .client-name { font-size:22px; font-weight:780; letter-spacing:-.03em; }
    .risk { padding:7px 10px; border-radius:999px; background:#fff1f1; color:var(--red); font-weight:760; font-size:12px; }
    .trend-chart { margin: 0; padding: 12px; border: 1px solid var(--line); border-radius:18px; background:linear-gradient(180deg,#fff,rgba(248,250,252,.86)); overflow:hidden; }
    .trend-chart img { display:block; width:100%; height:auto; border-radius:14px; }
    .report-shell { display:grid; gap:18px; min-width:0; max-width:100%; }
    .report-chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .report-chart-card, .report-card { background:#fff; border:1px solid var(--line); border-radius:20px; padding:20px; box-shadow:0 10px 28px rgba(30,45,70,.06); min-width:0; max-width:100%; overflow:hidden; }
    .report-card-title { display:flex; align-items:center; gap:10px; margin:0 0 16px; font-weight:780; color:var(--ink); }
    .report-card-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right, rgba(23,32,51,.12), transparent); }
    .report-metric-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:12px; }
    .report-link-title { grid-column:1 / -1; color:var(--blue); font-weight:780; padding:8px 0 6px; border-bottom:2px solid rgba(30,90,167,.28); }
    .report-metric-block { background:#f8fafc; border:1px solid #edf0f5; border-radius:16px; padding:16px; }
    .report-metric-label { color:var(--muted); font-size:12px; font-weight:680; margin-bottom:8px; }
    .report-metric-value { font-size:22px; font-weight:780; color:var(--ink); margin-bottom:8px; }
    .report-metric-change { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:12px; }
    .benchmark-line { margin-top:8px; padding-top:8px; border-top:1px dashed rgba(23,32,51,.14); color:var(--muted); font-size:12px; line-height:1.55; }
    .benchmark-line b { color:var(--ink); }
    .report-insight-card { background:linear-gradient(135deg,#f7fbff,#fffaf2); border:1px solid rgba(30,90,167,.14); border-radius:20px; padding:18px; box-shadow:0 10px 28px rgba(30,45,70,.05); }
    .report-insight-title { font-weight:820; margin-bottom:10px; color:var(--ink); }
    .todo-list { display:grid; gap:8px; margin:0; padding-left:18px; color:#263044; line-height:1.65; font-size:13px; }
    .todo-list ul { margin-top:6px; padding-left:18px; }
    .insight-tags { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px; }
    .insight-tag { display:inline-flex; align-items:center; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:760; background:#eef5ff; color:var(--blue); }
    .insight-tag.warn { background:#fff3e6; color:#a86416; }
    .report-product-table td { color: var(--ink) !important; font-weight: 500; }
    .report-product-table td:first-child { white-space:normal; min-width:320px; line-height:1.45; }
    .report-diagnosis .md-body { padding:0; }
    @media (max-width: 980px) { .report-chart-row, .report-metric-grid { grid-template-columns:1fr; } }
    details.raw-details { margin-top: 16px; border:1px solid var(--line); border-radius:20px; background:rgba(255,255,255,.72); overflow:hidden; min-width:0; max-width:100%; }
    details.raw-details > summary { cursor:pointer; padding:14px 16px; font-weight:760; color:var(--ink); }
    .md-body { padding: 18px; color:#263044; line-height:1.72; font-size:13px; min-width:0; max-width:100%; overflow-wrap:anywhere; }
    .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 { margin: 20px 0 10px; font-family: var(--serif); letter-spacing:-.02em; }
    .md-body p { margin: 8px 0; }
    .md-body blockquote { margin: 12px 0; padding: 12px 14px; border-left: 3px solid rgba(30,90,167,.36); background: rgba(234,242,255,.5); border-radius: 10px; color:var(--muted); }
    .md-body ul { margin: 8px 0 12px 18px; padding:0; }
    .md-body hr { border:0; border-top:1px solid var(--line); margin:18px 0; }
    .source-grid { display:grid; gap:16px; }
    .modal { position: fixed; inset: 0; background: rgba(15,22,36,.42); backdrop-filter: blur(12px); display:none; align-items:center; justify-content:center; z-index:100; padding:32px; }
    .modal.open { display:flex; }
    .modal-panel { width:min(1180px, 96vw); max-height: 92vh; overflow:auto; background:#fffdfa; border-radius:32px; box-shadow:0 40px 120px rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.7); }
    .modal-layout { display:grid; grid-template-columns: 1.35fr .75fr; gap:0; }
    .video-stage { background:#0f1624; min-height: 620px; display:grid; place-items:center; padding:24px; border-radius:32px 0 0 32px; }
    .video-stage video { width:100%; max-height: 72vh; border-radius:20px; background:#000; }
    .modal-side { padding:28px; }
    .modal-close { float:right; border:0; width:38px; height:38px; border-radius:50%; background:rgba(23,32,51,.08); cursor:pointer; }
    .modal-side h3 { font-family:var(--serif); font-size:30px; line-height:1.18; margin: 16px 0 14px; letter-spacing:-.04em; }
    .action-row { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0; }
    .primary-btn, .secondary-btn { text-decoration:none; border:0; border-radius:999px; padding:10px 14px; cursor:pointer; font:inherit; font-size:13px; }
    .primary-btn { background:var(--ink); color:#fff; }
    .secondary-btn { background:rgba(23,32,51,.07); color:var(--ink); }
    .insight-box { margin-top:18px; padding:16px; border:1px solid var(--line); border-radius:20px; background:rgba(244,241,233,.48); }
    .insight-box h4 { margin:0 0 8px; font-size:14px; }
    .insight-box p { margin:0; color:var(--muted); line-height:1.7; font-size:13px; }
    .frame-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .frame-btn { border:1px solid var(--line); background:#fff; border-radius:14px; padding:10px; cursor:pointer; text-align:left; }
    .frame-btn b { display:block; font-family:var(--mono); }
    .frame-btn span { color:var(--muted); font-size:12px; }
    @media (max-width: 1280px) { .product-grid { grid-template-columns: repeat(3, 1fr); } .client-grid { grid-template-columns: 1fr; } }
    @media (max-width: 980px) {
      body { min-width: 0; }
      .app { display:block; }
      .sidebar { position:relative; height:auto; padding:18px; border-right:0; border-bottom:1px solid var(--line); }
      .brand-mark { margin-bottom:14px; }
      .nav { display:flex; overflow:auto; gap:8px; }
      .nav a { flex:0 0 auto; }
      main { padding:18px 16px 56px; }
      .topbar, .section-head { align-items:flex-start; flex-direction:column; }
      .grid-2, .grid-3, .treemap-row { grid-template-columns:1fr; }
      .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .modal-layout { grid-template-columns:1fr; }
      .video-stage { border-radius:32px 32px 0 0; min-height:360px; }
    }

    .auth-locked .app { filter: blur(10px); pointer-events: none; user-select: none; }
    .auth-shell { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center; padding: 28px; background: radial-gradient(circle at 28% 18%, rgba(30,90,167,.16), transparent 28rem), rgba(251,250,246,.72); backdrop-filter: blur(18px); }
    .auth-card { width: min(520px, 94vw); border: 1px solid rgba(23,32,51,.12); border-radius: 30px; background: rgba(255,255,255,.92); box-shadow: 0 34px 90px rgba(23,32,51,.18); padding: 26px; }
    .auth-title { font-family: var(--serif); font-size: 28px; letter-spacing: -.04em; margin: 0 0 8px; }
    .auth-sub { margin: 0 0 20px; color: var(--muted); line-height: 1.7; font-size: 13px; }
    .auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 6px; border-radius: 999px; background: rgba(23,32,51,.06); margin-bottom: 18px; }
    .auth-tab { border: 0; padding: 11px 12px; border-radius: 999px; background: transparent; color: var(--muted); font: inherit; cursor: pointer; }
    .auth-tab.active { color: var(--ink); background: #fff; box-shadow: 0 8px 20px rgba(23,32,51,.08); font-weight: 760; }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-field { display: grid; gap: 7px; margin: 12px 0; }
    .auth-field label { font-size: 12px; color: var(--muted); font-weight: 680; }
    .auth-field input, .auth-field select { width: 100%; border: 1px solid rgba(23,32,51,.14); border-radius: 16px; padding: 12px 13px; background: #fff; color: var(--ink); font: inherit; outline: none; }
    .auth-field input:focus, .auth-field select:focus { border-color: rgba(30,90,167,.45); box-shadow: 0 0 0 4px rgba(30,90,167,.10); }
    .suggestion-box { display:none; margin-top:8px; border:1px solid rgba(23,32,51,.10); border-radius:16px; background:#fff; box-shadow:0 16px 36px rgba(23,32,51,.10); overflow:hidden; }
    .suggestion-box.show { display:block; }
    .suggestion-item { width:100%; border:0; background:#fff; text-align:left; padding:11px 13px; color:var(--ink); font:inherit; cursor:pointer; }
    .suggestion-item:hover { background:rgba(234,242,255,.72); }
    .auth-button { width: 100%; margin-top: 12px; border: 0; border-radius: 16px; padding: 13px 15px; color: #fff; background: var(--ink); font: inherit; font-weight: 760; cursor: pointer; }
    .auth-error { min-height: 20px; margin-top: 10px; color: var(--red); font-size: 12px; }
    .manual-user { display: none; }
    .manual-user.show { display: grid; }
    .fake-filter { display: none; margin-top: 10px; padding: 12px; border-radius: 16px; color: var(--muted); background: rgba(244,241,233,.72); font-size: 12px; line-height: 1.6; }
    .fake-filter.show { display: block; }

  </style>
</head>
<body class="auth-locked">

  <div class="auth-shell" id="authShell" aria-modal="true" role="dialog">
    <div class="auth-card">
      <h1 class="auth-title">跑品客户门户</h1>
      <div class="auth-tabs" style="grid-template-columns:1fr;">
        <button class="auth-tab active" data-auth-tab="external">外部商家客户</button>
      </div>
      <div class="auth-panel active" id="externalPanel">
        <div class="auth-field"><label>商家用户名</label><input id="merchantUsername" type="text" autocomplete="off" placeholder="输入用户名前两个字后选择" /><div class="suggestion-box" id="merchantSuggestions"></div></div>
        <div class="auth-field"><label>商家访问密码</label><input id="merchantPassword" type="password" autocomplete="current-password" placeholder="请输入商家访问密码" /></div>
        <button class="auth-button" id="externalLoginBtn">进入商家版门户</button>
      </div>
      <div class="auth-error" id="authError"></div>
    </div>
  </div>
  <div class="app">
    <aside class="sidebar">
      <div class="brand-mark">
        <div class="mark">跑</div>
        <div><div class="brand-title">跑品客户门户</div><div class="brand-sub">VIP Portal</div></div>
      </div>
      <nav class="nav">
        <a class="active" href="#vip">客户日报 <span>01</span></a>
        <a href="#selection">选品&创意 <span>02</span></a>
      </nav>
    </aside>
    <main>
      <section class="topbar" id="externalDateBar">
        <div class="topbar-left"><span class="eyebrow">VIP Portal</span><span class="pill" id="externalDatePill">数据日期</span></div>
        <label class="pill">切换日期 <select class="date-select" id="externalDateSelect"></select></label>

  };
  const styleDict = {
    '新中式':'新中式审美', '国风':'国风情绪', '美式':'美式休闲', '轻奢':'轻奢价格锚点', '高端':'高端质感', '专柜':'专柜背书', '老钱':'老钱风格', '复古':'复古调性', '法式':'法式精致', '韩版':'韩版日常', '商务':'商务场景', '休闲':'休闲百搭', '潮流':'潮流心智', '通勤':'通勤刚需', '户外':'户外场景'
  };
  const sceneDict = {
    '骑行':'骑行通勤', '开车':'开车场景', '旅游':'旅游出行', '户外':'户外活动', '妈妈':'妈妈人群', '爸爸':'爸爸人群', '中老年':'中老年人群', '大码':'大码人群', '夏季':'夏季季节需求', '春夏':'春夏换季', '端午':'节日礼赠', '送礼':'礼赠场景'
  };
  const offerDict = {'买一送一':'买一送一利益点','两件装':'两件装组合','10双':'多双装囤货','套装':'套装省心','礼盒':'礼盒送礼','顺丰':'物流承诺','厂家直销':'源头价信任'};
  const motifDict = {
    '年年有鱼':'年年有鱼寓意，适合把“好彩头/送礼”拍成开场钩子',
    '七粒米':'七粒米造型记忆点，适合用微距特写突出戒面细节',
    '老板链':'老板链身份符号，适合用手腕佩戴和商务场景做反差',
    '百福':'百福祝福符号，适合强化节庆/礼赠理由',

  };
  const motifs = pickMatches(name, motifDict);
  return {
    noun: productNoun(name),
    materials: pickMatches(name, materialDict),
    functions: pickMatches(name, functionDict),
    styles: pickMatches(name, styleDict),
    scenes: pickMatches(name, sceneDict),
    offers: pickMatches(name, offerDict),

}
function compactList(arr, fallback) {
  const x = [...new Set(arr.filter(Boolean))];
  return x.length ? x.slice(0, 3).join('、') : fallback;
}
function productInsight(p) {
  const name = p.name || '';
  const s = productSignals(name);
  const spend = p.spend !== undefined ? p.spend : '-';
  const roi = p.roi !== undefined ? p.roi : '-';
  const category = p.category || '当前类目';
  const proof = compactList([...s.motifs, ...s.materials, ...s.functions], '商品全貌、核心卖点、使用效果');
  const scene = compactList(s.scenes, compactList(s.styles, '目标人群的真实使用场景'));
  const offer = compactList(s.offers, '价格权益或购买理由');
  const rankLine = `这条素材对应「${name}」，在「${category}」中排名#${p.rank || '-'}，消耗${spend}${typeof spend === 'number' ? '万' : ''}，ROI ${roi}。`;
  const valueLine = `它的有效信息不应只归为「${s.noun}」，而是要围绕「${proof}」和「${scene}」建立购买理由；如果画面没有把这些证据拍清楚，榜单数据很难转化为可复制素材方法。`;
  const actionLine = `复盘时建议重点看三处：首帧是否一眼识别${s.noun}，中段是否证明${proof}，结尾是否用${offer}把用户推向点击。`;
  return rankLine + valueLine + actionLine;
}
function scriptInsight(p) {
  const name = p.name || '';
  const s = productSignals(name);
  const proof = compactList([...s.motifs, ...s.materials, ...s.functions], `${s.noun}细节和使用效果`);
  const scene = compactList(s.scenes, '典型使用场景');
  const offer = compactList(s.offers, '到手利益点');
  const hook = s.hook;
  return `建议按这条素材单独拆脚本：0-3秒用「${hook}」切入，画面直接给${s.noun}全貌，不要先讲泛泛品牌话；3-8秒用${proof}做证据镜头，最好包含近景特写或动态演示；8-15秒把${scene}讲清楚，让用户知道谁在什么场景需要它；最后用${offer}或价格锚点收口，形成点击理由。`;
}
function framePlan(p) {
  const s = productSignals(p.name || '');
  const proof = compactList([...s.materials, ...s.functions], '卖点证据');
  const scene = compactList(s.scenes, '使用场景');
  const offer = compactList(s.offers, '转化权益');
  return [`${s.noun}全貌+首屏钩子`, `${proof}特写/演示`, `${scene}+${offer}收口`];
}
function colClass(col, value) {
  return `${cls(value)} ${col === '客户简称' ? 'sticky-customer' : ''}`.trim();
}
function tableHTML(rows, columns) {
  if (!rows || !rows.length) return '<tbody><tr><td>暂无数据</td></tr></tbody>';
  const cols = columns || Object.keys(rows[0]);
  return `<thead><tr>${cols.map(c => `<th class="${c === '客户简称' ? 'sticky-customer' : ''}">${esc(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${cols.map(c => `<td class="${colClass(c, r[c])}">${esc(r[c] ?? '')}</td>`).join('')}</tr>`).join('')}</tbody>`;
}

function renderTreemaps() {
  const data = currentData();
  const row = document.getElementById('treemapRow');
  row.innerHTML = ['CID','小店'].map(link => `<div class="card treemap-card"><div class="treemap-title"><strong>${link} 二级类目消耗占比</strong><span class="pill">Top 5</span></div><div class="treemap" id="treemap-${link}"></div></div>`).join('');
  ['CID','小店'].forEach(link => {
    const el = document.getElementById(`treemap-${link}`);
    const rows = data.internal.overview[link] || [];
    const total = rows.reduce((sum, r) => sum + Number(r['消耗占比(%)'] || 0), 0) || 1;
    const first = Number(rows[0]?.['消耗占比(%)'] || 0);
    let y = 0;
    el.innerHTML = rows.map((r, i) => {
      const share = Number(r['消耗占比(%)'] || 0);
      let style;
      if (i === 0) style = `left:0%;top:0%;width:50%;height:100%;`;
      else { const hh = (share / Math.max(total - first, 1)) * 100; style = `left:50%;top:${y}%;width:50%;height:${hh}%;`; y += hh; }
      return `<div class="tile" style="${style}background:${colors[i % colors.length]};"><b>${esc(r['商品二级类目名称V2'])}</b><span>${esc(r['消耗占比(%)'])}% · ${esc(r['消耗(万元)'])}万</span></div>`;
    }).join('');
  });
}
function renderProducts() {
  const data = currentData();
  const allProducts = data.internal.products || [];
  const products = allProducts.filter(p => p.link === state.productLink);
  const cats = ['全部', ...Array.from(new Set(products.map(p => p.category)))];
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = cats.map(c => `<button class="${c === state.productCategory ? 'active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
  tabs.querySelectorAll('button').forEach(btn => btn.onclick = () => { state.productCategory = btn.dataset.cat; renderProducts(); });
  const shown = products.filter(p => state.productCategory === '全部' || p.category === state.productCategory);
  document.getElementById('productGrid').innerHTML = shown.map((p, idx) => `<article class="card product-card" data-idx="${allProducts.indexOf(p)}"><div class="cover"><video muted playsinline preload="metadata" src="${esc(p.url)}#t=0.8"></video><div class="cover-fallback">${esc(shortName(p.name, 24))}</div><div class="rank">#${esc(p.rank || idx + 1)}</div><div class="play-dot">▶</div></div><div class="product-body"><div class="product-name">${esc(p.name)}</div><div class="product-meta"><div><span>消耗</span><b>${fmt(p.spend,'万')}</b></div><div><span>ROI</span><b>${fmt(p.roi)}</b></div><div><span>创意</span><b>${fmt(p.creativeCount)}</b></div></div></div></article>`).join('');
  document.querySelectorAll('.product-card').forEach(card => card.onclick = () => openCreative(allProducts[Number(card.dataset.idx)]));
  prepareVideoCovers();
}
function prepareVideoCovers() {
  document.querySelectorAll('.cover video').forEach(v => {
    const fallback = v.parentElement.querySelector('.cover-fallback');
    v.addEventListener('loadeddata', () => { fallback.style.display = 'none'; try { v.currentTime = Math.min(0.8, v.duration || 0.8); } catch(e) {} v.pause(); }, { once: true });
    v.addEventListener('error', () => { fallback.style.display = 'grid'; }, { once: true });
  });
}
function openCreative(p) {
  const modal = document.getElementById('creativeModal');
  const video = document.getElementById('modalVideo');
  video.src = p.url;
  document.getElementById('modalMeta').textContent = `${p.link} · ${p.category} · Rank ${p.rank}`;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('downloadBtn').href = p.url;
  document.getElementById('downloadBtn').setAttribute('download', `${p.name}.mp4`);
  document.getElementById('insightText').textContent = productInsight(p);
  document.getElementById('scriptText').textContent = scriptInsight(p);
  const frames = framePlan(p);
  document.getElementById('frameGrid').innerHTML = [0.8, 2.5, 5.0].map((t, i) => `<button class="frame-btn" data-time="${t}"><b>${t.toFixed(1)}s</b><span>${frames[i]}</span></button>`).join('');
  document.querySelectorAll('.frame-btn').forEach(btn => btn.onclick = () => { video.currentTime = Number(btn.dataset.time); video.play(); });
  document.getElementById('copyUrlBtn').onclick = () => navigator.clipboard?.writeText(p.url);
  modal.classList.add('open');
}
function closeCreative() { const v = document.getElementById('modalVideo'); v.pause(); v.removeAttribute('src'); document.getElementById('creativeModal').classList.remove('open'); }
function clientSpendValue(c) {
  const cid = c.effects.CID || c.effects['小店'] || {};
  const raw = cid['消耗']?.value || '0';
  const v = Number(String(raw).replace(/[^0-9.\-]/g, ''));
  return Number.isFinite(v) ? v : 0;
}
function formatCount(v){const n=Number(v||0);return Number.isFinite(n)?Math.round(n).toLocaleString('zh-CN'):'-';}
function formatSignedCount(v){const n=Number(v||0);if(!Number.isFinite(n))return '-';return `${n>=0?'+':''}${Math.round(n).toLocaleString('zh-CN')}`;}
function foundationBenchmarkHTML(c){const rows=Object.entries(c.foundationBenchmark||{});if(!rows.length)return '';return `<div class="report-insight-card"><div class="report-insight-title">基建 Benchmark 对比（10 家头部客户均值）</div><div class="report-metric-grid">${rows.map(([m,it])=>`<div class="report-metric-block"><div class="report-metric-label">${esc(m)}</div><div class="report-metric-value">${formatCount(it.value)}</div><div class="benchmark-line">Benchmark：<b>${formatCount(it.benchmark)}</b><br/>差距：<b class="${Number(it.diff||0)<0?'down':'up'}">${formatSignedCount(it.diff)}</b></div></div>`).join('')}</div></div>`;}
function metricSectionHTML(title,data,c=null){const links=Object.keys(data||{});if(!links.length&&title!=='基建指标')return '';const bm=title==='基建指标'&&c?foundationBenchmarkHTML(c):'';const body=links.map(link=>`<div class="report-link-title">${esc(link)}链路</div>${Object.entries(data[link]).map(([label,item])=>`<div class="report-metric-block"><div class="report-metric-label">${esc(label)}</div><div class="report-metric-value">${esc(item.value||'-')}</div><div class="report-metric-change"><span>环比 ${esc(item.delta||'-')}</span><span class="${cls(item.rate)}">${esc(item.rate||'-')}</span></div></div>`).join('')}`).join('');return `<div class="report-card"><div class="report-card-title">${title}</div>${bm}<div class="report-metric-grid" style="margin-top:${bm?'14px':'0'};">${body}</div></div>`;}
function productName(p){return String(p.name||'').replace(/^\(|\)$/g,'');}
function productInsightList(items,emptyText){if(!items||!items.length)return `<li>${esc(emptyText)}</li>`;return items.map(p=>`<li>${esc(productName(p))}（${esc(p.link||'-')}，消耗 ${fmt(Number(p.spend||0).toFixed(2),'万')}，ROI ${fmt(Number(p.roi||0).toFixed(2))}）</li>`).join('');}
function productInsightsHTML(c){const ins=c.productInsights||{};return `<div class="report-insight-card"><div class="report-insight-title">商品数据结论 / To-do</div><div class="insight-tags"><span class="insight-tag">建议增投 ${ins.summary?.scaleCount||0} 个</span><span class="insight-tag warn">观察成本 ${ins.summary?.watchCount||0} 个</span></div><ol class="todo-list"><li><b>建议增投：</b><ul>${productInsightList(ins.scale,'暂无“消耗超过 1,000 元且 ROI ≥ 2.0”的商品，先不盲目加预算。')}</ul></li><li><b>继续观察 / 关注成本：</b><ul>${productInsightList(ins.watch,'暂无明显低 ROI 商品，保持现有测试节奏。')}</ul></li></ol></div>`;}
function productTableHTML(c){if(!c.products||!c.products.length)return '';return `<div class="report-card"><div class="report-card-title">商品数据</div>${productInsightsHTML(c)}<div class="table-wrap" style="margin-top:14px;"><table class="report-product-table">${tableHTML(c.products,['link','推广产品ID','消耗(万元)','竞价CPM(元)','目标出价(元)','下单ROI','下单单价(元)','下单成本(元)','下单率(%)','ctr(%)'])}</table></div></div>`;}
function diagnosisHTML(c) {
  const html = c.source?.html || '';
  const idx = html.indexOf('昨日投放诊断');
  const coreIdx = html.indexOf('核心结论');
  const start = idx >= 0 ? Math.max(0, html.lastIndexOf('<h3', idx)) : (coreIdx >= 0 ? Math.max(0, html.lastIndexOf('<h3', coreIdx)) : 0);
  return `<div class="report-card report-diagnosis"><div class="report-card-title">投放诊断</div><div class="md-body">${html.slice(start)}</div></div>`;
}
function actionSummaryHTML(c){const scale=c.productInsights?.summary?.scaleCount||0;const watch=c.productInsights?.summary?.watchCount||0;const weak=Object.entries(c.foundationBenchmark||{}).filter(([,it])=>Number(it.diff||0)<0).map(([m])=>m);const strong=Object.entries(c.foundationBenchmark||{}).filter(([,it])=>Number(it.diff||0)>=0).map(([m])=>m);return `<div class="report-insight-card"><div class="report-insight-title">今日关键 To-do</div><ol class="todo-list"><li><b>商品数据维度：</b>${scale?`有 ${scale} 个商品满足增投条件，优先承接预算；`:'暂未发现明确增投商品；'}${watch?`另有 ${watch} 个商品 ROI 偏低，需要结合成本继续观察或收缩。`:'低 ROI 风险较少，保持测试。'}</li><li><b>基建维度：</b>${weak.length?`${weak.map(esc).join('、')}低于 10 家头部客户均值，需要补强；`:'三项基建均在头部均值水位线上，继续保持。'}${strong.length?` ${strong.map(esc).join('、')}已达均值或以上。`:''}</li></ol></div>`;}
function renderClientReport(c,idx,prefix){return `<div class="report-shell">${actionSummaryHTML(c)}<div class="report-chart-row"><div class="report-chart-card"><div class="report-card-title">消耗趋势（近14天，万元）</div><div class="trend-chart" id="${prefix}-cost-${idx}"></div></div><div class="report-chart-card"><div class="report-card-title">下单 ROI 趋势（近14天）</div><div class="trend-chart" id="${prefix}-roi-${idx}"></div></div></div>${metricSectionHTML('效果指标',c.effects,c)}${metricSectionHTML('基建指标',c.basics,c)}${productTableHTML(c)}${diagnosisHTML(c)}</div>`;}

  drawTrendSeries(document.getElementById(`${prefix}-cost-${idx}`), c.trend, '消耗(万元)', '消耗趋势', '#1e5aa7', '万');
  drawTrendSeries(document.getElementById(`${prefix}-roi-${idx}`), c.trend, '下单ROI', '下单 ROI 趋势', '#087f5b', '');

function renderClientCards() {
  const data = currentData();
  const grid = document.getElementById('clientGrid');
  const clients = [...data.clients].sort((a, b) => clientSpendValue(b) - clientSpendValue(a));
  grid.innerHTML = clients.map((c, idx) => {
    const cid = c.effects.CID || c.effects['小店'] || {};
    const spend = cid['消耗']?.value || '-';
    const spendRate = cid['消耗']?.rate || '-';
    const roi = cid['下单ROI']?.value || '-';
    return `<details class="raw-details client-folder"><summary>${esc(c.name)} · 消耗 ${esc(spend)} · ROI ${esc(roi)} · ${esc(spendRate)}</summary><article class="client-card">${renderClientReport(c, idx, 'client')}</article></details>`;
  }).join('');
  clients.forEach((c, idx) => renderReportCharts(c, idx, 'client'));

function drawTrendSeries(el,rows,field,title,color='#1e5aa7',unit=''){if(!el||!rows||!rows.length)return;rows=rows.filter(r=>!(['05-26','05-28'].includes(String(r['日期']||'').trim())&&Number(r['消耗(万元)']||0)<=0.01&&Number(r['下单ROI']||0)===0));if(!rows.length)return;const vals=rows.map(r=>Number(r[field]||0)).filter(v=>Number.isFinite(v));const dates=rows.map(r=>r['日期']||'');const max=Math.max(...vals,1);const min=0;const top=max===min?max+1:max*1.12;const w=960,h=310,padX=58,padY=56,bottomPad=48;const xAt=i=>padX+i*((w-padX*2)/Math.max(vals.length-1,1));const yAt=v=>h-bottomPad-((v-min)/(top-min||1))*(h-padY-bottomPad);const pointList=vals.map((v,i)=>`${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`).join(' ');const area=`${padX},${h-bottomPad} ${pointList} ${w-padX},${h-bottomPad}`;const grid=[0,1,2,3].map(i=>{const y=padY+i*((h-padY-bottomPad)/3);return `<line x1="${padX}" y1="${y}" x2="${w-padX}" y2="${y}" stroke="#e7ebf0" stroke-width="1"/>`;}).join('');const labels=dates.map((d,i)=>`<text x="${xAt(i)}" y="${h-18}" text-anchor="middle" fill="#8a93a3" font-size="10">${d}</text>`).join('');const valueLabels=vals.map((v,i)=>{const y=Math.max(18,yAt(v)-(i%2===0?10:22));return `<text x="${xAt(i)}" y="${y}" text-anchor="middle" fill="${color}" font-size="11" font-weight="700">${v.toFixed(2)}${unit}</text>`;}).join('');const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><rect width="${w}" height="${h}" rx="18" fill="#ffffff"/><text x="${padX}" y="28" fill="#172033" font-size="15" font-weight="700">${title}</text><text x="${w-padX}" y="28" text-anchor="end" fill="#8a93a3" font-size="11">纵轴从 0 起，避免低点被误判</text>${grid}<polygon points="${area}" fill="#dfeaff" opacity="0.52"/><polyline points="${pointList}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>${vals.map((v,i)=>`<circle cx="${xAt(i)}" cy="${yAt(v)}" r="4" fill="#fff" stroke="${color}" stroke-width="2"/>`).join('')}${valueLabels}${labels}</svg>`;el.innerHTML=`<img alt="${title}" src="data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}" />`;}
function drawTrend(el, rows) { drawTrendSeries(el, rows, '消耗(万元)', '消耗趋势', '#1e5aa7', '万'); }
function wireStaticEvents() {

function spendBucket(v) {
  if (typeof v === 'string' && /万|到/.test(v)) return v;
  const n = Number(v || 0);
  if (n >= 5) return '5万+';
  if (n >= 3) return '3到5万';
  if (n >= 1) return '1到3万';
  if (n >= 0.5) return '5,000到1万';
  return '0到5,000';
}
function roiBucket(v) {
  if (typeof v === 'string' && /到/.test(v)) return v;
  const n = Number(v || 0);
  if (!Number.isFinite(n)) return '-';
  const low = Math.floor(n * 10) / 10;
  return `${low.toFixed(1)}到${(low + 0.1).toFixed(1)}`;
}
function pctInt(v) {
  const n = Number(String(v ?? '').replace('%',''));
  return Number.isFinite(n) ? `${Math.round(n)}%` : '-';
}

function normalizeQuery(text) {
  return String(text || '').toLowerCase().replace(/\s+/g, '');

function accountSearchText(account) {

function renderMerchantSuggestions(query) {
  const box = document.getElementById('merchantSuggestions');
  if (!box) return;
  const q = normalizeQuery(query);
  if (!q) { box.classList.remove('show'); box.innerHTML = ''; return; }
  const matches = getMerchantAccounts().filter(a => accountSearchText(a).includes(q)).slice(0, 5);
  if (!matches.length) { box.classList.remove('show'); box.innerHTML = ''; return; }
  box.innerHTML = matches.map(a => `<button type="button" class="suggestion-item" data-user="${esc(a.username)}">${esc(a.username)}</button>`).join('');
  box.classList.add('show');
  box.querySelectorAll('.suggestion-item').forEach(btn => btn.onclick = () => {
    document.getElementById('merchantUsername').value = btn.dataset.user;
    box.classList.remove('show');
  });
}
function setupMerchantAutocomplete() {
  const input = document.getElementById('merchantUsername');

function renderExternalTreemaps() {
  const data = authData();
  const row = document.getElementById('treemapRow');
  row.innerHTML = ['CID','小店'].map(link => `<div class="card treemap-card"><div class="treemap-title"><strong>${link} 二级类目占比</strong><span class="pill">脱敏占比</span></div><div class="treemap" id="treemap-${link}"></div></div>`).join('');
  ['CID','小店'].forEach(link => {
    const el = document.getElementById(`treemap-${link}`);
    const rows = data.internal.overview[link] || [];
    const total = rows.reduce((sum, r) => sum + Number(r['消耗占比(%)'] || 0), 0) || 1;
    const first = Number(rows[0]?.['消耗占比(%)'] || 0);
    let y = 0;
    el.innerHTML = rows.map((r, i) => {
      const share = Number(r['消耗占比(%)'] || 0);
      let style;
      if (i === 0) style = `left:0%;top:0%;width:50%;height:100%;`;
      else { const hh = (share / Math.max(total - first, 1)) * 100; style = `left:50%;top:${y}%;width:50%;height:${hh}%;`; y += hh; }
      return `<div class="tile" style="${style}background:${colors[i % colors.length]};"><b>${esc(r['商品二级类目名称V2'])}</b><span>${pctInt(r['消耗占比(%)'])}</span></div>`;

  });
